---
environment:
  ## bridge
  - NIC=br0
  - NIC_MAC=52:54:00:74:65:73
  - VM_SYS_ARCH=x86_64
  - VM_SYS_PLAT=winnt
swtpm:
  arguments:
    - socket
    - --ctrl type=unixio,path={TMP_QEMU_DIR_PATH}/{instance}/tpm.socket
    - --log file=-
    - --tpm2
    - --tpmstate dir={TMP_QEMU_DIR_PATH}/{instance}
    - --daemon
qemu:
  arguments:
    - -name {instance},debug-threads=on
    - -machine type=q35,accel=kvm,pflash0=flash0,pflash1=flash1
    - -nodefaults
    - -global ICH9-LPC.disable_s3=1
    - -global ICH9-LPC.disable_s4=1
    - -blockdev driver=file,node-name=flash0,read-only=on,filename={VIRT_QEMU_DIR_PATH}/{instance}/OVMF_CODE_4M.ms.fd
    - -blockdev driver=file,node-name=flash1,discard=unmap,filename={VIRT_QEMU_DIR_PATH}/{instance}/OVMF_VARS_4M.ms.fd
    - -boot menu=on
    - -chardev socket,id=cdtpm0,path={TMP_QEMU_DIR_PATH}/{instance}/tpm.socket
    - -tpmdev emulator,id=tpm0,chardev=cdtpm0
    - -device tpm-tis,tpmdev=tpm0
    - -rtc base=localtime,clock=host
    - -cpu host,host-cache-info=on,migratable=off{VM_CPU_FLAGS}
    - -smp sockets={VM_CPU_SOCKETS},cores={VM_CPU_CORES},threads={VM_CPU_THREADS}
    - -m 8g
    - -netdev bridge,id=net0,br={NIC}
    - -device virtio-net-pci,netdev=net0,mac={NIC_MAC}
    - -device virtio-rng-pci
    - -device qemu-xhci
    - -drive "if=none,media=cdrom,id=iso0,readonly=on,file={WARE_IMAGES_DIR_PATH}/{VM_SYS_PLAT}/Win11_24H2_English_x64.iso"
    - -device usb-storage,drive=iso0,removable=true
    - -object iothread,id=iot0
    - -device virtio-scsi-pci,id=scsi0,iothread=iot0
    - -blockdev driver=file,node-name=file0,aio=native,cache.direct=on,discard=unmap,filename={VIRT_QEMU_DIR_PATH}/{instance}/os.raw
    - -blockdev driver=raw,node-name=ssd0,file=file0
    - -device scsi-hd,bus=scsi0.0,scsi-id=0,drive=ssd0,rotation_rate=1
    - -display none
    - -monitor unix:{TMP_QEMU_DIR_PATH}/{instance}/monitor.socket,server=on,wait=off
    - -qmp unix:{TMP_QEMU_DIR_PATH}/{instance}/qmp.socket,server=on,wait=off
    - -pidfile {TMP_QEMU_DIR_PATH}/{instance}/qemu.pid
    - -daemonize
